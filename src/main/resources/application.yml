server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dqi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:mapper/*.xml

logging:
  level:
    org.hibernate.SQL: warn
